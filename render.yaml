services:
  - type: web
    name: lightapi
    runtime: docker
    plan: free
    region: ohio
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/directory/categories
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://lightapi.dev,https://lightai-kohl.vercel.app,http://localhost:3000,http://localhost:5173
      - key: DATABASE_URL
        value: sqlite:////data/lightapi.db
